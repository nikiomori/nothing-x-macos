# CI build for the macOS app.
# This is an Xcode project (there is no Package.swift), so it is built with
# xcodebuild. `swift build` / `swift test` only work for SwiftPM packages and
# fail here with "error: could not find Package.swift".

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build (unsigned)
      run: |
        xcodebuild build \
          -project "Nothing X MacOS.xcodeproj" \
          -target "Nothing X MacOS" \
          -configuration Debug \
          -sdk macosx \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""
